# Auto-publishes @webitte-hosting/emdash to GitHub Packages when a
# semver tag is pushed (e.g. `git tag v0.2.0 && git push --tags`).
# Uses the workflow's built-in GITHUB_TOKEN — no PAT or 2FA needed.
name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@webitte-hosting'
      - run: pnpm install
      # Test gate — descriptor + runtime suites must pass before we
      # republish a new version.
      - run: pnpm test
      - run: pnpm build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
